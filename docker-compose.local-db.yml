services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: noteapp
      POSTGRES_USER: noteapp
      POSTGRES_PASSWORD: noteapp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noteapp -d noteapp"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - note_app_local_pg15_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro

volumes:
  note_app_local_pg15_data:
